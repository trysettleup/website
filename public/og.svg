<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="glow" cx="50%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.35" />
      <stop offset="60%" stop-color="#0EA5E9" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#0B1120" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#0EA5E9" />
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#1E293B" stroke-width="1" />
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#0B1120" />
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.5" />
  <rect width="1200" height="630" fill="url(#glow)" />
  <g transform="translate(80 120)">
    <text x="0" y="60" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="56" font-weight="900" font-style="italic" letter-spacing="-4">
      <tspan fill="#F1F5F9">SETTLE</tspan><tspan fill="#10B981">UP</tspan>
    </text>
    <text x="0" y="240" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="88" font-weight="800" fill="#F1F5F9" letter-spacing="-2">
      <tspan x="0">Open source</tspan>
      <tspan x="0" dy="100" fill="url(#accent)">Laravel packages.</tspan>
    </text>
    <text x="0" y="460" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="500" fill="#94A3B8" letter-spacing="-0.5">
      Visualizations · Workflowable · MIT licensed · Built in the open
